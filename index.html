<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的爱情运行时长</title>
    <style>
        /* ========== 全局样式重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 日系治愈海滩背景 ========== */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: url('background.webp') center center / cover no-repeat fixed;
            overflow-x: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            position: relative;
        }

        /* 背景半透明遮罩，保证文字可读 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.45);
            z-index: 0;
            pointer-events: none;
        }

        /* ========== 背景粒子效果 ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(145, 210, 247, 0.5);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* ========== 主容器 ========== */
        .container {
            text-align: center;
            z-index: 2;
            padding: 20px;
            padding-top: max(12vh, 80px);
        }

        /* iOS 安全区域适配 */
        @supports (padding-top: env(safe-area-inset-top)) {
            .container {
                padding-top: calc(max(12vh, 80px) + env(safe-area-inset-top));
            }
        }

        /* ========== 主标题样式 ========== */
        .title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #1A5276, #2E86C1, #1B4F72, #1A5276);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite, glow 3s ease-in-out infinite;
            position: relative;
        }

        /* 标题光晕效果 */
        .title::before {
            content: '我们的爱情运行时长';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(90deg, #1A5276, #2E86C1, #1B4F72, #1A5276);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        /* ========== 数字显示区域 ========== */
        .timer-wrapper {
            position: relative;
            margin: 40px 0;
        }

        /* 数字外圈光晕 */
        .timer-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(145, 210, 247, 0.15) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* 秒数数字 */
        .seconds {
            font-size: clamp(2rem, 8vw, 8rem);
            font-weight: 100;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #1A5276 0%, #2E86C1 25%, #1B4F72 50%, #2E86C1 75%, #1A5276 100%);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite, numberGlow 2s ease-in-out infinite;
            position: relative;
            display: inline-block;
            transition: transform 0.1s ease;
            max-width: 95vw;
            word-break: break-all;
            line-height: 1.2;
        }

        /* 数字跳动效果 */
        .seconds.bump {
            animation: gradientShift 6s ease infinite, numberGlow 2s ease-in-out infinite, bump 0.15s ease;
        }

        @keyframes bump {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* 数字光晕层 */
        .seconds::before {
            content: attr(data-value);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, #1A5276, #2E86C1, #1B4F72, #2E86C1);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease infinite;
            filter: blur(30px);
            opacity: 0.4;
            z-index: -1;
        }

        @keyframes numberGlow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(74, 144, 196, 0.3))
                        drop-shadow(0 0 30px rgba(145, 210, 247, 0.2));
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(74, 144, 196, 0.5))
                        drop-shadow(0 0 50px rgba(145, 210, 247, 0.3));
            }
        }

        /* 秒字单位 */
        .unit {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(74, 107, 130, 0.6);
            margin-left: 10px;
            font-weight: 300;
            letter-spacing: 0.2em;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* ========== 详细时间显示 ========== */
        .details {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 40px);
            flex-wrap: wrap;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(145, 210, 247, 0.3);
            border-radius: 15px;
            padding: clamp(15px, 3vw, 25px);
            min-width: clamp(80px, 15vw, 120px);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .detail-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .detail-item:hover {
            border-color: rgba(91, 163, 217, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(145, 210, 247, 0.2);
        }

        .detail-value {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 200;
            color: #4A90C4;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(74, 144, 196, 0.3);
        }

        .detail-label {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: rgba(74, 107, 130, 0.5);
            margin-top: 8px;
            letter-spacing: 0.1em;
        }

        /* ========== 副标题 ========== */
        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            color: rgba(74, 107, 130, 0.6);
            margin-top: 40px;
            letter-spacing: 0.15em;
            font-weight: 300;
            position: relative;
        }

        .subtitle::before,
        .subtitle::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(145, 210, 247, 0.5));
            vertical-align: middle;
            margin: 0 15px;
        }

        .subtitle::after {
            background: linear-gradient(90deg, rgba(145, 210, 247, 0.5), transparent);
        }

        /* ========== 底部状态栏 ========== */
        .status-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            color: rgba(74, 107, 130, 0.5);
            letter-spacing: 0.15em;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            z-index: 3;
            gap: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            border: 1px solid rgba(145, 210, 247, 0.2);
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #5ba3d9;
            border-radius: 50%;
            animation: statusBlink 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(91, 163, 217, 0.5);
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(91, 163, 217, 0.5); }
            50% { opacity: 0.5; box-shadow: 0 0 20px rgba(91, 163, 217, 0.3); }
        }

        /* ========== 心形装饰 ========== */
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            opacity: 0;
            animation: heartFloat 8s ease-in-out infinite;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ========== 响应式调整 ========== */
        @media (max-width: 768px) {
            .details {
                gap: 10px;
            }

            .detail-item {
                min-width: 70px;
                padding: 12px;
            }

            .status-bar {
                flex-direction: column;
                gap: 10px;
                padding: 12px 20px;
            }

            .subtitle::before,
            .subtitle::after {
                display: none;
            }
        }

        /* ========== 闪烁线条装饰 ========== */
        .line-decoration {
            position: fixed;
            width: 1px;
            height: 100px;
            background: linear-gradient(180deg, transparent, rgba(145, 210, 247, 0.3), transparent);
            animation: lineFloat 5s ease-in-out infinite;
        }

        @keyframes lineFloat {
            0%, 100% {
                transform: translateY(-100px);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* ========== 音乐控制按钮 ========== */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(145, 210, 247, 0.3);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            color: rgba(74, 144, 196, 0.8);
            outline: none;
        }

        .music-btn:hover {
            border-color: rgba(91, 163, 217, 0.5);
            box-shadow: 0 0 20px rgba(145, 210, 247, 0.3);
        }

        .music-btn.playing {
            animation: musicSpin 3s linear infinite;
            border-color: rgba(91, 163, 217, 0.5);
            box-shadow: 0 0 15px rgba(145, 210, 247, 0.3);
        }

        .music-btn .music-tip {
            display: none;
            position: absolute;
            top: 52px;
            right: 0;
            white-space: nowrap;
            font-size: 12px;
            color: rgba(74, 107, 130, 0.7);
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid rgba(145, 210, 247, 0.2);
        }

        .music-btn:hover .music-tip {
            display: block;
        }

        @keyframes musicSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ========== 留言板样式 ========== */
        .message-board {
            margin-top: 60px;
            width: 100%;
            max-width: 800px;
            padding-bottom: 100px;
        }

        .message-board-title {
            color: rgba(74, 107, 130, 0.7);
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
            position: relative;
        }

        .message-board-title::before,
        .message-board-title::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(145, 210, 247, 0.5));
            vertical-align: middle;
            margin: 0 15px;
        }

        .message-board-title::after {
            background: linear-gradient(90deg, rgba(145, 210, 247, 0.5), transparent);
        }

        @media (max-width: 768px) {
            .message-board-title::before,
            .message-board-title::after {
                display: none;
            }
        }

        /* ========== 相册轮播样式 ========== */
        .album {
            margin-top: 60px;
            width: 100%;
            max-width: 800px;
            padding-bottom: 20px;
        }

        .album-title {
            color: rgba(74, 107, 130, 0.7);
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
            position: relative;
        }

        .album-title::before,
        .album-title::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(145, 210, 247, 0.5));
            vertical-align: middle;
            margin: 0 15px;
        }

        .album-title::after {
            background: linear-gradient(90deg, rgba(145, 210, 247, 0.5), transparent);
        }

        .carousel {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(145, 210, 247, 0.25);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            color: rgba(74, 144, 196, 0.8);
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            outline: none;
        }

        .carousel-btn:hover {
            border-color: rgba(91, 163, 217, 0.5);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 15px rgba(145, 210, 247, 0.2);
        }

        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid rgba(145, 210, 247, 0.35);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .carousel-dot.active {
            background: rgba(91, 163, 217, 0.7);
            box-shadow: 0 0 8px rgba(145, 210, 247, 0.4);
        }

        .carousel-dot:hover {
            border-color: rgba(91, 163, 217, 0.6);
        }

        /* ========== 相册上传/删除 ========== */
        .carousel-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
        }

        .carousel-upload-btn,
        .carousel-delete-btn {
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid rgba(145, 210, 247, 0.35);
            background: rgba(255, 255, 255, 0.7);
            color: rgba(74, 144, 196, 0.8);
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .carousel-upload-btn:hover {
            background: rgba(145, 210, 247, 0.2);
            border-color: rgba(91, 163, 217, 0.5);
            box-shadow: 0 0 15px rgba(145, 210, 247, 0.15);
        }

        .carousel-delete-btn {
            border-color: rgba(200, 100, 100, 0.3);
            color: rgba(200, 100, 100, 0.7);
        }

        .carousel-delete-btn:hover {
            border-color: rgba(200, 100, 100, 0.6);
            background: rgba(200, 100, 100, 0.1);
        }

        .carousel-empty {
            color: rgba(74, 107, 130, 0.4);
            text-align: center;
            padding: 60px 20px;
            font-size: 14px;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .album-title::before,
            .album-title::after {
                display: none;
            }

            .carousel-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
        }

        /* ========== 留言板表单样式 ========== */
        .message-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .message-form-row {
            display: flex;
            gap: 12px;
        }

        .message-input,
        .message-textarea {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(145, 210, 247, 0.25);
            border-radius: 10px;
            padding: 12px 16px;
            color: rgba(74, 107, 130, 0.9);
            font-size: 14px;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .message-input:focus,
        .message-textarea:focus {
            border-color: rgba(91, 163, 217, 0.5);
            box-shadow: 0 0 15px rgba(145, 210, 247, 0.15);
        }

        .message-input::placeholder,
        .message-textarea::placeholder {
            color: rgba(74, 107, 130, 0.35);
        }

        .message-input {
            flex: 0 0 150px;
        }

        .message-textarea {
            flex: 1;
            min-height: 60px;
            resize: vertical;
        }

        .message-submit {
            align-self: flex-end;
            padding: 8px 24px;
            border-radius: 20px;
            border: 1px solid rgba(145, 210, 247, 0.35);
            background: rgba(145, 210, 247, 0.1);
            color: rgba(74, 144, 196, 0.8);
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            outline: none;
        }

        .message-submit:hover {
            background: rgba(145, 210, 247, 0.2);
            border-color: rgba(91, 163, 217, 0.5);
            box-shadow: 0 0 15px rgba(145, 210, 247, 0.15);
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-item {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(145, 210, 247, 0.2);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
            animation: msgFadeIn 0.3s ease;
        }

        @keyframes msgFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .message-author {
            color: #4A90C4;
            font-size: 14px;
            font-weight: 500;
        }

        .message-time {
            color: rgba(74, 107, 130, 0.35);
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .message-content {
            color: rgba(74, 107, 130, 0.75);
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message-delete-btn {
            background: none;
            border: 1px solid rgba(200, 100, 100, 0.3);
            color: rgba(200, 100, 100, 0.6);
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .message-delete-btn:hover {
            border-color: rgba(200, 100, 100, 0.6);
            color: rgba(200, 100, 100, 0.9);
            background: rgba(200, 100, 100, 0.08);
        }

        /* 删除确认弹窗 */
        .delete-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-modal {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(145, 210, 247, 0.3);
            border-radius: 15px;
            padding: 25px 30px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: msgFadeIn 0.2s ease;
        }

        .delete-modal p {

<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 心形装饰 -->
    <div class="hearts" id="hearts"></div>

    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>
    <button class="music-btn" id="musicBtn" title="背景音乐">
        <span id="musicIcon">&#9835;</span>
        <span class="music-tip">点击播放音乐</span>
    </button>

    <!-- 爱情清单入口按钮 -->
    <button class="music-btn" id="bucketBtn" title="爱情清单" style="right: 75px;">
        <span>&#10084;</span>
        <span class="music-tip">爱情清单</span>
    </button>

    <!-- 主内容 -->
    <div class="container">
        <!-- 主标题 -->
        <h1 class="title">我们的爱情运行时长</h1>

        <!-- 秒数显示 -->
        <div class="timer-wrapper">
            <span class="seconds" id="seconds" data-value="0">0</span>
            <span class="unit">秒</span>
        </div>

        <!-- 详细时间 -->
        <div class="details">
            <div class="detail-item">
                <div class="detail-value" id="years">0</div>
                <div class="detail-label">年</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="days">0</div>
                <div class="detail-label">天</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="hours">0</div>
                <div class="detail-label">时</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="minutes">0</div>
                <div class="detail-label">分</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="secs">0</div>
                <div class="detail-label">秒</div>
            </div>
        </div>

        <!-- 副标题 -->
        <p class="subtitle">Since 2021-10-24 18:30:00</p>

        <!-- 相册轮播 -->
        <div class="album">
            <h2 class="album-title">我们的相册</h2>
            <div class="carousel" id="carousel">
                <div class="carousel-track" id="carouselTrack"></div>
                <button class="carousel-btn prev" id="carouselPrev">&#10094;</button>
                <button class="carousel-btn next" id="carouselNext">&#10095;</button>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
            <div class="carousel-actions">
                <input type="file" id="photoInput" accept="image/*" style="display:none">
                <button class="carousel-upload-btn" id="uploadBtn">上传照片</button>
                <button class="carousel-delete-btn" id="deletePhotoBtn">删除当前照片</button>
            </div>

        <!-- 留言板 -->
        <div class="message-board">
            <h2 class="message-board-title">我们的留言板</h2>
            <div class="message-form">
                <div class="message-form-row">
                    <input type="text" class="message-input" id="msgAuthor" placeholder="你的名字" maxlength="20">
                    <textarea class="message-textarea" id="msgContent" placeholder="写下你想说的话..." maxlength="500"></textarea>
                </div>
                <button class="message-submit" id="msgSubmit">留言</button>
            </div>
            <div class="message-list" id="messageList"></div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <div class="status-dot"></div>
        <span>System: Love.exe</span>
        <span>|</span>
        <span>Status: Running Forever</span>
        <span>|</span>
        <span>访问量: <span id="busuanzi_value_site_pv">加载中</span></span>
    </div>

    <!-- 不蒜子访问统计 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    </div>

    <script>
        // ========== 配置 ==========
        const START_DATE = new Date('2021-10-24T18:30:00');

        // ========== DOM 元素 ==========
        const secondsEl = document.getElementById('seconds');
        const yearsEl = document.getElementById('years');
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secsEl = document.getElementById('secs');
        const particlesContainer = document.getElementById('particles');
        const heartsContainer = document.getElementById('hearts');

        // ========== 初始化粒子效果 ==========
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // ========== 创建心形装饰 ==========
        function createHearts() {
            const heartSymbols = ['❤', '💕', '💗', '💖', '💝'];
            for (let i = 0; i < 10; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (6 + Math.random() * 4) + 's';
                heart.style.fontSize = (15 + Math.random() * 15) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        // ========== 计算时间差 ==========
        function calculateTimeDiff() {
            const now = new Date();
            const diff = Math.floor((now - START_DATE) / 1000); // 总秒数

            // 计算各个单位
            const years = Math.floor(diff / (365.25 * 24 * 3600));
            const remainingAfterYears = diff % Math.floor(365.25 * 24 * 3600);
            const days = Math.floor(remainingAfterYears / (24 * 3600));
            const hours = Math.floor((diff % (24 * 3600)) / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;

            return { totalSeconds: diff, years, days, hours, minutes, seconds };
        }

        // ========== 格式化数字 ==========
        function formatNumber(num) {
            return num.toString();
        }

        // ========== 更新显示 ==========
        let lastTotalSeconds = 0;

        function updateDisplay() {
            const time = calculateTimeDiff();

            // 更新总秒数
            secondsEl.textContent = formatNumber(time.totalSeconds);
            secondsEl.setAttribute('data-value', formatNumber(time.totalSeconds));

            // 秒数变化时添加跳动效果
            if (time.totalSeconds !== lastTotalSeconds) {
                secondsEl.classList.remove('bump');
                void secondsEl.offsetWidth; // 触发重绘
                secondsEl.classList.add('bump');
                lastTotalSeconds = time.totalSeconds;
            }

            // 更新详细时间
            yearsEl.textContent = time.years;
            daysEl.textContent = time.days;
            hoursEl.textContent = String(time.hours).padStart(2, '0');
            minutesEl.textContent = String(time.minutes).padStart(2, '0');
            secsEl.textContent = String(time.seconds).padStart(2, '0');
        }

        // ========== 初始化 ==========
        function init() {
            createParticles();
            createHearts();
            initCarousel();
            renderMessages();
            updateDisplay();

            // 每秒更新一次
            setInterval(updateDisplay, 1000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);

        // ========== 背景音乐控制 ==========
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        const musicIcon = document.getElementById('musicIcon');
        const musicTip = musicBtn.querySelector('.music-tip');
        let musicPlaying = false;

        bgm.volume = 0.3;

        function startMusic() {
            bgm.play().then(() => {
                musicBtn.classList.add('playing');
                musicIcon.innerHTML = '&#9834;';
                musicTip.textContent = '点击暂停音乐';
                musicPlaying = true;
            }).catch(() => {
                musicTip.textContent = '点击此处开始播放';
                // 浏览器阻止了自动播放，监听首次点击来启动
                document.addEventListener('click', function autoStart() {
                    if (!musicPlaying) {
                        bgm.play().then(() => {
                            musicBtn.classList.add('playing');
                            musicIcon.innerHTML = '&#9834;';
                            musicTip.textContent = '点击暂停音乐';
                            musicPlaying = true;
                        }).catch(() => {});
                    }
                    document.removeEventListener('click', autoStart);
                }, { once: true });
            });
        }

        function toggleMusic() {
            if (musicPlaying) {
                bgm.pause();
                musicBtn.classList.remove('playing');
                musicIcon.innerHTML = '&#9835;';
                musicTip.textContent = '点击播放音乐';
                musicPlaying = false;
            } else {
                startMusic();
            }
        }

        musicBtn.addEventListener('click', toggleMusic);

        // 页面加载后自动播放
        document.addEventListener('DOMContentLoaded', startMusic);

        // ========== 相册轮播 ==========
        const PHOTO_KEY = 'love_photos';

        function getDefaultPhotos() {
            return [
                'photos/photos_01.jpg',
                'photos/photos_02.jpg',
            ];
        }

        function getUploadedPhotos() {
            try { return JSON.parse(localStorage.getItem(PHOTO_KEY)) || []; }
            catch { return []; }
        }

        function saveUploadedPhotos(photos) {
            localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
        }

        function getAllPhotos() {
            return [...getDefaultPhotos(), ...getUploadedPhotos()];
        }

        let currentSlide = 0;

        function buildCarousel() {
            const photos = getAllPhotos();
            const track = document.getElementById('carouselTrack');
            const dots = document.getElementById('carouselDots');
            const carousel = document.getElementById('carousel');
            track.innerHTML = '';
            dots.innerHTML = '';

            if (photos.length === 0) {
                carousel.style.display = 'none';
                track.innerHTML = '<div class="carousel-empty">还没有照片，点击下方上传吧</div>';
                return;
            }
            carousel.style.display = '';

            photos.forEach((src, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                const img = document.createElement('img');
                img.src = src;
                img.alt = '照片 ' + (i + 1);
                img.draggable = false;
                slide.appendChild(img);
                track.appendChild(slide);

                const dot = document.createElement('button');
                dot.className = 'carousel-dot' + (i === currentSlide ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(i));
                dots.appendChild(dot);
            });

            if (currentSlide >= photos.length) currentSlide = 0;
            goToSlide(currentSlide);
        }

        function initCarousel() {
            buildCarousel();

            document.getElementById('carouselPrev').addEventListener('click', () => {
                const total = getAllPhotos().length;
                if (total === 0) return;
                goToSlide(currentSlide === 0 ? total - 1 : currentSlide - 1);
            });
            document.getElementById('carouselNext').addEventListener('click', () => {
                const total = getAllPhotos().length;
                if (total === 0) return;
                goToSlide(currentSlide === total - 1 ? 0 : currentSlide + 1);
            });

            // 触摸滑动支持
            let touchStartX = 0;
            const carousel = document.getElementById('carousel');
            carousel.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
            carousel.addEventListener('touchend', e => {
                const total = getAllPhotos().length;
                if (total === 0) return;
                const diff = touchStartX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) goToSlide(currentSlide === total - 1 ? 0 : currentSlide + 1);
                    else goToSlide(currentSlide === 0 ? total - 1 : currentSlide - 1);
                }
            });

            // 上传照片（需要密码）
            document.getElementById('uploadBtn').addEventListener('click', () => {
                showPasswordModal('请输入密码', '确认', () => {
                    document.getElementById('photoInput').click();
                });
            });
            document.getElementById('photoInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('照片不能超过 5MB');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const uploaded = getUploadedPhotos();
                    uploaded.push(ev.target.result);
                    saveUploadedPhotos(uploaded);
                    currentSlide = getAllPhotos().length - 1;
                    buildCarousel();
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });

            // 删除当前照片
            document.getElementById('deletePhotoBtn').addEventListener('click', () => {
                const photos = getAllPhotos();
                if (photos.length === 0) return;
                showPasswordModal('请输入删除密码', '确认删除', () => {
                    const defaultCount = getDefaultPhotos().length;
                    if (currentSlide < defaultCount) {
                        // 默认照片无法真正删除，提示用户
                        alert('这是默认照片，无法删除');
                        return;
                    }
                    const uploaded = getUploadedPhotos();
                    const idx = currentSlide - defaultCount;
                    uploaded.splice(idx, 1);
                    saveUploadedPhotos(uploaded);
                    if (currentSlide >= getAllPhotos().length) {
                        currentSlide = Math.max(0, getAllPhotos().length - 1);
                    }
                    buildCarousel();
                });
            });
        }

        function goToSlide(index) {
            currentSlide = index;
            document.getElementById('carouselTrack').style.transform = 'translateX(-' + (index * 100) + '%)';
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        // ========== 留言板 ==========
        const MSG_KEY = 'love_messages';

        function getMessages() {
            try { return JSON.parse(localStorage.getItem(MSG_KEY)) || []; }
            catch { return []; }
        }

        function saveMessages(msgs) {
            localStorage.setItem(MSG_KEY, JSON.stringify(msgs));
        }

        function renderMessages() {
            const list = document.getElementById('messageList');
            const msgs = getMessages();
            if (msgs.length === 0) {
                list.innerHTML = '<div class="message-empty">还没有留言，写下第一条吧</div>';
                return;
            }
            list.innerHTML = msgs.map((m, i) => `
                <div class="message-item">
                    <div class="message-item-header">
                        <span class="message-author">${escapeHtml(m.author)}</span>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span class="message-time">${m.time}</span>
                            <button class="message-delete-btn" onclick="showPasswordModal('请输入删除密码', '确认删除', null, ${i})">删除</button>
                        </div>
                    </div>
                    <div class="message-content">${escapeHtml(m.content)}</div>
                </div>
            `).reverse().join('');
        }

        // ========== 删除留言 ==========
        const DELETE_PASSWORD = '1314';

        function showPasswordModal(title, confirmText, onSuccess, msgIndex) {
            const overlay = document.createElement('div');
            overlay.className = 'delete-modal-overlay';
            overlay.innerHTML = `
                <div class="delete-modal">
                    <p>${title || '请输入密码'}</p>
                    <input type="password" id="deletePwdInput" placeholder="密码" autocomplete="off">
                    <div class="delete-modal-error" id="deleteError"></div>
                    <div class="delete-modal-btns">
                        <button class="delete-modal-cancel" id="deleteCancelBtn">取消</button>
                        <button class="delete-modal-confirm" id="deleteConfirmBtn">${confirmText || '确认'}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const pwdInput = document.getElementById('deletePwdInput');
            const errorEl = document.getElementById('deleteError');
            pwdInput.focus();

            const close = () => overlay.remove();

            document.getElementById('deleteCancelBtn').addEventListener('click', close);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

            const confirmDelete = () => {
                if (pwdInput.value === DELETE_PASSWORD) {
                    if (onSuccess) {
                        close();
                        onSuccess();
                    } else {
                        const msgs = getMessages();
                        msgs.splice(msgIndex, 1);
                        saveMessages(msgs);
                        close();
                        renderMessages();
                    }
                } else {
                    errorEl.textContent = '密码错误';
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            };

            document.getElementById('deleteConfirmBtn').addEventListener('click', confirmDelete);
            pwdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmDelete(); });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function submitMessage() {
            const author = document.getElementById('msgAuthor').value.trim();
            const content = document.getElementById('msgContent').value.trim();
            if (!author) { document.getElementById('msgAuthor').focus(); return; }
            if (!content) { document.getElementById('msgContent').focus(); return; }

            const msgs = getMessages();
            msgs.push({
                author,
                content,
                time: new Date().toLocaleString('zh-CN')
            });
            saveMessages(msgs);
            document.getElementById('msgContent').value = '';
            renderMessages();
        }

        document.getElementById('msgSubmit').addEventListener('click', submitMessage);

        function getBucketChecked() {
            try { return JSON.parse(localStorage.getItem(BUCKET_KEY)) || {}; }
            catch { return {}; }
        }

        function saveBucketChecked(checked) {
            localStorage.setItem(BUCKET_KEY, JSON.stringify(checked));
        }

        function toggleBucketItem(index) {
            const checked = getBucketChecked();
            checked[index] = !checked[index];
            saveBucketChecked(checked);
            updateBucketModal();
        }

        function updateBucketModal() {
            const checked = getBucketChecked();
            const checkedCount = Object.values(checked).filter(Boolean).length;
            const total = bucketItems.length;

            const progressText = document.getElementById('bucketProgressText');
            const progressFill = document.getElementById('bucketProgressFill');
            if (progressText) progressText.textContent = '已完成 ' + checkedCount + ' / ' + total;
            if (progressFill) progressFill.style.width = (checkedCount / total * 100) + '%';

            document.querySelectorAll('.bucket-item').forEach((item, i) => {
                item.classList.toggle('checked', !!checked[i]);
            });
        }

        function openBucketList() {
            const checked = getBucketChecked();
            const checkedCount = Object.values(checked).filter(Boolean).length;

            const overlay = document.createElement('div');
            overlay.className = 'bucket-overlay';
            overlay.id = 'bucketOverlay';
            overlay.innerHTML = `
                <div class="bucket-modal">
                    <div class="bucket-modal-header">
                        <span class="bucket-modal-title">我们的爱情清单</span>
                        <button class="bucket-close-btn" id="bucketCloseBtn">&#10005;</button>

                    <div class="bucket-progress" style="padding: 12px 24px; flex-shrink: 0;">

                        <div class="bucket-progress-bar">

                        </div>
                    </div>
                    <div class="bucket-list-body">
                        <div class="bucket-grid">
                            ${bucketItems.map((text, i) => `
                                <div class="bucket-item ${checked[i] ? 'checked' : ''}" data-index="${i}">
                                    <span class="bucket-item-num">${String(i + 1).padStart(2, '0')}</span>
                                    <div class="bucket-checkbox">${checked[i] ? '&#10003;' : ''}</div>
                                    <span class="bucket-text">${escapeHtml(text)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const close = () => overlay.remove();
            document.getElementById('bucketCloseBtn').addEventListener('click', close);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

            overlay.querySelectorAll('.bucket-item').forEach(item => {
                item.addEventListener('click', () => {
                    const idx = parseInt(item.dataset.index);
                    toggleBucketItem(idx);
                    const c = getBucketChecked();
                    const checkbox = item.querySelector('.bucket-checkbox');
                    if (c[idx]) {

                        item.classList.remove('checked');

                    document.getElementById('bucketProgressText').textContent = '已完成 ' + cc + ' / ' + bucketItems.length;

            });
